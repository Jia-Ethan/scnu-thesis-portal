services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scnu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-scnu_thesis}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scnu} -d ${POSTGRES_DB:-scnu_thesis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      APP_ENV: production
      MAX_DOCX_SIZE_BYTES: ${MAX_DOCX_SIZE_BYTES:-20971520}
      MAX_TEXT_PRECHECK_CHARS: ${MAX_TEXT_PRECHECK_CHARS:-80000}
      SCNU_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scnu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scnu_thesis}
      SCNU_STORAGE_DIR: /data/storage
      SCNU_ACCESS_CODE: ${SCNU_ACCESS_CODE:?set SCNU_ACCESS_CODE}
      SCNU_SECRET_KEY: ${SCNU_SECRET_KEY:?set SCNU_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: https://${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:?set TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?set TURNSTILE_SECRET_KEY}
      PUBLIC_EXPORT_RATE_LIMIT_PER_HOUR: ${PUBLIC_EXPORT_RATE_LIMIT_PER_HOUR:-10}
      PUBLIC_EXPORT_RETENTION_SECONDS: ${PUBLIC_EXPORT_RETENTION_SECONDS:-1800}
    volumes:
      - app-storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["uv", "run", "python", "-m", "backend.app.worker"]
    restart: unless-stopped
    environment:
      APP_ENV: production
      SCNU_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-scnu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scnu_thesis}
      SCNU_STORAGE_DIR: /data/storage
      SCNU_SECRET_KEY: ${SCNU_SECRET_KEY:?set SCNU_SECRET_KEY}
      PUBLIC_EXPORT_RETENTION_SECONDS: ${PUBLIC_EXPORT_RETENTION_SECONDS:-1800}
    volumes:
      - app-storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:?set TURNSTILE_SITE_KEY}
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  app-storage:
  caddy-data:
  caddy-config:
