name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/scnu-compliance-rebuild

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Run backend and compliance tests
        run: uv run pytest tests -q

      - name: Run frontend smoke tests
        run: npm run test:smoke --prefix web

      - name: Build frontend
        run: npm run build --prefix web

      - name: Build public bundle
        run: uv run python scripts/build_web_public.py

      - name: Export compliance fixture
        run: uv run python scripts/export_compliance_fixture.py tmp/ci-fixture-export.docx

      - name: Check DOCX compliance fixture
        run: uv run python scripts/check_docx_compliance.py tmp/ci-fixture-export.docx
